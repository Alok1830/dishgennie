{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="{% block theme %}user{% endblock %}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{% block meta_description %}DishGennie — Premium Maid Booking Platform. Book verified, trusted house help in 60 seconds.{% endblock %}">
    <title>{% block title %}DishGennie{% endblock %} — Premium Maid Booking</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="{% static 'images/favicon.svg' %}">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <!-- Leaflet (for maps) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- DishGennie Design System -->
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="stylesheet" href="{% static 'css/components.css' %}">
    {% block extra_css %}{% endblock %}

    <!-- CSRF Token for AJAX -->
    <meta name="csrf-token" content="{{ csrf_token }}">
    {% if user.is_authenticated %}
    <meta name="user-role" content="{{ user.role }}">
    <meta name="user-id" content="{{ user.id }}">
    {% endif %}
    {% if jwt_access %}
    <meta name="jwt-access" content="{{ jwt_access }}">
    <meta name="jwt-refresh" content="{{ jwt_refresh }}">
    {% endif %}
</head>
<body>
    <!-- Page Loading Bar -->
    <div class="dg-loading-bar" id="loadingBar"></div>

    <!-- Toast Container -->
    <div id="toast-container" class="dg-toast-container"></div>

    {% block body %}
    {% endblock %}

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- DishGennie Core JS -->
    <script src="{% static 'js/app.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
