{% extends "base.html" %}
{% block title %}Password Reset Complete{% endblock %}
{% block body %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--gray-50);padding:40px 20px" data-theme="user">
<div style="text-align:center;max-width:460px" class="animate-fade-in-up">
<div style="width:80px;height:80px;border-radius:50%;background:var(--success-light);display:flex;align-items:center;justify-content:center;margin:0 auto 24px">
<i class="bi bi-check-lg" style="font-size:2.5rem;color:var(--success)"></i>
</div>
<h2 style="font-family:var(--font-display);font-weight:800;margin-bottom:12px">Password Reset Successful! 🎉</h2>
<p style="color:var(--gray-500);margin-bottom:32px;line-height:1.7">Your password has been changed successfully. You can now sign in with your new password.</p>
<a href="{% url 'login' %}" class="btn-premium btn-premium-lg"><i class="bi bi-box-arrow-in-right me-2"></i>Sign In Now</a>
</div>
</div>
{% endblock %}
