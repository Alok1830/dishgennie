{% extends "admin_panel/base_admin.html" %}
{% block a_nav_users %}active{% endblock %}
{% block page_title %}User Management{% endblock %}
{% block content %}
<div class="chart-card animate-fade-in-up">
<div class="chart-card-header"><div class="chart-card-title" id="usersTitle">All Users</div><div class="d-flex gap-2"><select class="dg-input" id="roleFilter" style="width:140px;padding:8px 12px;font-size:.82rem"><option value="">All Roles</option><option value="customer">Customers</option><option value="maid">Maids</option><option value="admin">Admins</option></select><input type="text" class="dg-input" id="userSearch" style="width:220px;padding:8px 12px;font-size:.82rem" placeholder="Search users..."></div></div>
<table class="dg-table"><thead><tr><th>User</th><th>Email</th><th>Role</th><th>City</th><th>Status</th><th>Joined</th></tr></thead>
<tbody id="usersBody"></tbody></table>
</div>
{% endblock %}
{% block extra_js %}
<script>
let adminUsers = [];
function renderUsers() {
    const role = document.getElementById('roleFilter').value;
    const search = document.getElementById('userSearch').value.toLowerCase();
    const users = adminUsers.filter(user => (!role || user.role === role) && (`${user.username} ${user.first_name} ${user.last_name} ${user.email}`.toLowerCase().includes(search)));
    document.getElementById('usersTitle').textContent = `All Users (${users.length})`;
    document.getElementById('usersBody').innerHTML = users.length ? users.map(user => `
        <tr>
            <td><div class="d-flex align-items-center gap-2"><img src="https://ui-avatars.com/api/?name=${encodeURIComponent(user.first_name || user.username)}&background=${user.role === 'admin' ? '4f46e5' : user.role === 'maid' ? '7c3aed' : '0d9488'}&color=fff&size=60" class="rounded-circle" width="32" height="32"><div><div class="fw-bold small">${user.first_name || user.username} ${user.last_name || ''}</div><div class="small text-muted">${user.username}</div></div></div></td>
            <td class="small">${user.email || '-'}</td>
            <td><span class="badge" style="background:rgba(13,148,136,.1);color:#0d9488;font-weight:600">${user.role}</span></td>
            <td class="small">${user.city || '-'}</td>
            <td><span class="status-badge ${user.is_verified ? 'completed' : 'pending'}">${user.is_verified ? 'Verified' : 'Active'}</span></td>
            <td class="small text-muted">${DG.formatDate(user.created_at)}</td>
        </tr>
    `).join('') : '<tr><td colspan="6"><div class="empty-state"><div class="empty-state-icon"><i class="bi bi-people"></i></div><div class="empty-state-title">No users found</div></div></td></tr>';
}
document.addEventListener('DOMContentLoaded', async function() {
    const data = await DG.api('/accounts/admin/users/');
    adminUsers = data?.results || data || [];
    renderUsers();
    document.getElementById('roleFilter').addEventListener('change', renderUsers);
    document.getElementById('userSearch').addEventListener('input', DG.debounce(renderUsers, 200));
});
</script>
{% endblock %}
