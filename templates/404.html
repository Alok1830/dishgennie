{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — DishGennie</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <style>
        .error-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--gray-50); padding: 40px 20px; }
        .error-container { text-align: center; max-width: 500px; }
        .error-code { font-family: var(--font-display); font-size: 8rem; font-weight: 900; background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; margin-bottom: 16px; }
        .error-icon { font-size: 4rem; color: var(--primary); margin-bottom: 20px; animation: float 3s ease-in-out infinite; }
        .error-title { font-family: var(--font-display); font-size: 1.6rem; font-weight: 700; margin-bottom: 12px; color: var(--gray-900); }
        .error-text { color: var(--gray-500); font-size: 1rem; margin-bottom: 32px; line-height: 1.7; }
        .error-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    </style>
</head>
<body data-theme="user">
<div class="error-page">
    <div class="error-container animate-fade-in-up">
        <div class="error-code">404</div>
        <div class="error-icon"><i class="bi bi-search"></i></div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-text">Oops! The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
        <div class="error-actions">
            <a href="/" class="btn-premium"><i class="bi bi-house me-2"></i>Go Home</a>
            <a href="{% url 'find-maid' %}" class="btn-premium-outline"><i class="bi bi-search me-2"></i>Find a Maid</a>
        </div>
    </div>
</div>
</body>
</html>
